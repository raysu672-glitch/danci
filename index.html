<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>视听双轨对齐背单词 - Dual Coding</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes prefix-pulse {
      0%, 100% { text-shadow: 0 0 30px rgba(251, 191, 36, 0.4); }
      50% { text-shadow: 0 0 60px rgba(251, 191, 36, 0.8); }
    }
    .prefix-animate {
      animation: prefix-pulse 1.5s ease-in-out infinite;
    }
  </style>
</head>
<body class="bg-gray-950 text-slate-100 min-h-screen flex flex-col items-center justify-center p-4 select-none">

  <!-- 提示语 -->
  <div class="text-center mb-6 px-4">
    <p class="text-slate-400 text-sm leading-relaxed">
      提示：使用键盘 <kbd class="px-2 py-1 bg-slate-700 rounded text-amber-400 font-mono">空格键 Space</kbd> 或 <kbd class="px-2 py-1 bg-slate-700 rounded text-amber-400 font-mono">→</kbd> 控制记忆阶梯，告别死记硬背。
    </p>
  </div>

  <!-- 五步记忆法流程看板 -->
  <div id="phaseIndicator" class="flex items-center gap-2 mb-6">
    <span id="phase0Dot" class="w-3 h-3 rounded-full bg-amber-400 transition-all duration-300"></span>
    <span id="phase1Dot" class="w-3 h-3 rounded-full bg-slate-600 transition-all duration-300"></span>
    <span id="phase2Dot" class="w-3 h-3 rounded-full bg-slate-600 transition-all duration-300"></span>
    <span id="phase3Dot" class="w-3 h-3 rounded-full bg-slate-600 transition-all duration-300"></span>
    <span id="phase4Dot" class="w-3 h-3 rounded-full bg-slate-600 transition-all duration-300"></span>
    <span id="phaseLabel" class="text-slate-500 text-xs ml-2">阶段 0：前缀呈现</span>
  </div>

  <!-- Main Display Area -->
  <div class="w-full max-w-3xl mx-auto flex flex-col items-center">

    <!-- Word Construction Zone -->
    <div id="wordZone" class="relative flex items-baseline justify-center mb-10 min-h-[120px]">
      <div id="prefixContainer" class="flex items-baseline gap-0">
        <span id="prefixText" class="text-8xl md:text-9xl font-bold text-amber-400 prefix-animate opacity-0"></span>
        <span id="rootText" class="text-8xl md:text-9xl font-bold text-white opacity-0 translate-x-8 transition-all duration-300 ease-out"></span>
      </div>
    </div>

    <!-- Prefix Meaning -->
    <div id="prefixMeanContainer" class="text-center mb-6 opacity-0">
      <span class="text-amber-400 text-xl md:text-2xl font-medium">「<span id="prefixMeanText"></span>」</span>
    </div>

    <!-- Logic Container (Phase 2 独立显示) -->
    <div id="logicContainer" class="text-center mb-4 opacity-0 transition-opacity duration-400">
      <div class="inline-flex items-center gap-3 bg-slate-800/50 px-5 py-2.5 rounded-xl border border-slate-700">
        <span class="text-slate-400 text-base">词源逻辑</span>
        <span class="text-xl text-amber-300 font-semibold">→</span>
        <span id="logicText" class="text-xl md:text-2xl text-slate-100"></span>
      </div>
    </div>

    <!-- Chinese Container (Phase 3 独立显示) -->
    <div id="chineseContainer" class="text-center opacity-0 transition-opacity duration-400">
      <div class="bg-emerald-900/30 px-8 py-4 rounded-2xl border border-emerald-700/50">
        <span id="chineseText" class="text-4xl md:text-5xl font-bold text-emerald-400"></span>
      </div>
    </div>

  </div>

  <!-- Progress -->
  <div class="mt-10 mb-4">
    <span id="progressText" class="text-slate-600 text-sm font-mono">1 / 6</span>
  </div>

  <!-- 操作指引 -->
  <div id="actionHint" class="text-center mb-4">
    <p class="text-slate-500 text-sm">按 <kbd class="px-2 py-1 bg-slate-700 rounded text-amber-400 font-mono">空格</kbd> 进入下一阶段</p>
  </div>

  <!-- 手机端空格键按钮 -->
  <button id="spaceBtn" class="w-full max-w-xs px-8 py-4 bg-amber-600 hover:bg-amber-500 active:bg-amber-400 text-white rounded-xl font-semibold transition-all duration-200 text-lg shadow-lg shadow-amber-600/30">
    ▶ 下一步 (空格)
  </button>

  <!-- 上一个/下一个 单词按钮 -->
  <div class="flex items-center gap-3 mt-4">
    <button id="prevBtn" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg transition-all duration-200 text-sm disabled:opacity-30 disabled:cursor-not-allowed">
      ← 上一个词
    </button>
    <button id="nextWordBtn" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg transition-all duration-200 text-sm disabled:opacity-30 disabled:cursor-not-allowed">
      下一个词 →
    </button>
  </div>

  <!-- 闭眼全黑遮罩 (Phase 4) -->
  <div id="blackOverlay" class="fixed inset-0 bg-black z-50 flex flex-col items-center justify-center transition-opacity duration-300 pointer-events-none opacity-0">
    <div id="overlayContent" class="text-center">
      <p id="overlayHint" class="text-slate-500 text-lg md:text-2xl mb-8 tracking-wide">请闭眼，在脑海中回放音形意...</p>
      <div id="countdownNumber" class="text-7xl md:text-9xl font-bold text-slate-300 opacity-60">3</div>
    </div>
  </div>

  <script>
    const vocabularyData = [
      { word: "extract",  prefix: "ex-",   prefixMean: "往外",   root: "tract", rootMean: "拉", logic: "往外拉",                    chinese: "提取，拔出" },
      { word: "attract",  prefix: "at-",   prefixMean: "向/去",  root: "tract", rootMean: "拉", logic: "拉过来",                    chinese: "吸引，引诱" },
      { word: "distract", prefix: "dis-",  prefixMean: "分开/散开", root: "tract", rootMean: "拉", logic: "心思被拉散",              chinese: "使分心，分散注意力" },
      { word: "contract", prefix: "con-",  prefixMean: "共同/一起", root: "tract", rootMean: "拉", logic: "拉到一起",                  chinese: "收缩，合同" },
      { word: "abstract", prefix: "abs-",  prefixMean: "离开/分离", root: "tract", rootMean: "拉", logic: "把核心拉出来、与具体分离",  chinese: "抽象的，摘要" },
      { word: "protract", prefix: "pro-",  prefixMean: "向前",    root: "tract", rootMean: "拉", logic: "向前拉长",                    chinese: "延长，拖延" }
    ];

    let currentIndex = 0;
    let currentPhase = 0;
    let isInPhase4 = false;

    const prefixText       = document.getElementById('prefixText');
    const rootText         = document.getElementById('rootText');
    const prefixMeanText   = document.getElementById('prefixMeanText');
    const logicText        = document.getElementById('logicText');
    const chineseText      = document.getElementById('chineseText');
    const prefixMeanContainer = document.getElementById('prefixMeanContainer');
    const logicContainer   = document.getElementById('logicContainer');
    const chineseContainer = document.getElementById('chineseContainer');
    const progressText     = document.getElementById('progressText');
    const actionHint       = document.getElementById('actionHint');
    const spaceBtn         = document.getElementById('spaceBtn');
    const prevBtn          = document.getElementById('prevBtn');
    const nextWordBtn      = document.getElementById('nextWordBtn');
    const phase0Dot        = document.getElementById('phase0Dot');
    const phase1Dot        = document.getElementById('phase1Dot');
    const phase2Dot        = document.getElementById('phase2Dot');
    const phase3Dot        = document.getElementById('phase3Dot');
    const phase4Dot        = document.getElementById('phase4Dot');
    const phaseLabel       = document.getElementById('phaseLabel');
    const blackOverlay     = document.getElementById('blackOverlay');
    const countdownNumber  = document.getElementById('countdownNumber');

    function speak(word) {
      if (!('speechSynthesis' in window)) return;
      speechSynthesis.cancel();
      const utt = new SpeechSynthesisUtterance(word);
      utt.lang = 'en-US';
      utt.rate = 0.85;
      utt.pitch = 1;
      speechSynthesis.speak(utt);
    }

    function playDing() {
      try {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx) return;
        const ctx = new AudioCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(1200, ctx.currentTime);
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.4);
      } catch (e) {}
    }

    function updatePhaseIndicator(phase) {
      const dots = [phase0Dot, phase1Dot, phase2Dot, phase3Dot, phase4Dot];
      const labels = [
        '阶段 0：前缀呈现',
        '阶段 1：音形缝合（跟读）',
        '阶段 2：逻辑唤醒（盲猜中文）',
        '阶段 3：中文揭晓（验证）',
        '阶段 4：闭眼回放（记忆固化）'
      ];
      dots.forEach((dot, i) => {
        if (i < phase) {
          dot.classList.remove('bg-slate-600');
          dot.classList.add('bg-emerald-400');
        } else if (i === phase) {
          dot.classList.remove('bg-slate-600');
          dot.classList.add('bg-amber-400');
        } else {
          dot.classList.remove('bg-amber-400', 'bg-emerald-400');
          dot.classList.add('bg-slate-600');
        }
      });
      phaseLabel.textContent = labels[phase] || '';
    }

    function enterPhase0() {
      currentPhase = 0;
      isInPhase4 = false;
      const d = vocabularyData[currentIndex];
      progressText.textContent = `${currentIndex + 1} / ${vocabularyData.length}`;
      prevBtn.disabled = currentIndex === 0;
      nextWordBtn.disabled = currentIndex === vocabularyData.length - 1;
      prefixText.textContent = d.prefix;
      rootText.textContent = d.root;
      prefixMeanText.textContent = d.prefixMean;
      logicText.textContent = d.logic;
      chineseText.textContent = d.chinese;
      rootText.classList.add('opacity-0', 'translate-x-8');
      rootText.classList.remove('opacity-100', 'translate-x-0');
      logicContainer.classList.add('opacity-0');
      logicContainer.classList.remove('opacity-100');
      chineseContainer.classList.add('opacity-0');
      chineseContainer.classList.remove('opacity-100');
      requestAnimationFrame(() => {
        prefixText.classList.remove('opacity-0');
        prefixText.classList.add('opacity-100');
        prefixMeanContainer.style.transition = 'none';
        prefixMeanContainer.classList.remove('opacity-0');
        prefixMeanContainer.classList.add('opacity-100');
        setTimeout(() => { prefixMeanContainer.style.transition = ''; }, 10);
      });
      updatePhaseIndicator(0);
      actionHint.innerHTML = '<p class="text-slate-500 text-sm">按 <kbd class="px-2 py-1 bg-slate-700 rounded text-amber-400 font-mono">空格</kbd> 播放发音并拼合单词</p>';
      spaceBtn.textContent = '▶ 发音拼合';
      spaceBtn.disabled = false;
      spaceBtn.classList.remove('opacity-50', 'cursor-not-allowed');
    }

    function enterPhase1() {
      currentPhase = 1;
      const d = vocabularyData[currentIndex];
      speak(d.word);
      rootText.classList.remove('opacity-0', 'translate-x-8');
      rootText.classList.add('opacity-100', 'translate-x-0');
      logicContainer.classList.add('opacity-0');
      logicContainer.classList.remove('opacity-100');
      chineseContainer.classList.add('opacity-0');
      chineseContainer.classList.remove('opacity-100');
      updatePhaseIndicator(1);
      actionHint.innerHTML = '<p class="text-slate-500 text-sm">大声跟读！按 <kbd class="px-2 py-1 bg-slate-700 rounded text-amber-400 font-mono">空格</kbd> 显示词源逻辑</p>';
      spaceBtn.textContent = '▶ 显示逻辑';
    }

    function enterPhase2() {
      currentPhase = 2;
      logicContainer.classList.remove('opacity-0');
      logicContainer.classList.add('opacity-100');
      chineseContainer.classList.add('opacity-0');
      chineseContainer.classList.remove('opacity-100');
      updatePhaseIndicator(2);
      actionHint.innerHTML = '<p class="text-slate-500 text-sm">盲猜中文！按 <kbd class="px-2 py-1 bg-slate-700 rounded text-amber-400 font-mono">空格</kbd> 揭晓答案</p>';
      spaceBtn.textContent = '▶ 揭晓中文';
    }

    function enterPhase3() {
      currentPhase = 3;
      chineseContainer.classList.remove('opacity-0');
      chineseContainer.classList.add('opacity-100');
      updatePhaseIndicator(3);
      actionHint.innerHTML = '<p class="text-slate-500 text-sm">看清中文！按 <kbd class="px-2 py-1 bg-slate-700 rounded text-amber-400 font-mono">空格</kbd> 进入闭眼回放</p>';
      spaceBtn.textContent = '▶ 闭眼回放';
    }

    function enterPhase4() {
      currentPhase = 4;
      isInPhase4 = true;
      updatePhaseIndicator(4);
      blackOverlay.classList.remove('opacity-0');
      blackOverlay.classList.add('opacity-100');
      spaceBtn.disabled = true;
      spaceBtn.classList.add('opacity-50', 'cursor-not-allowed');
      actionHint.innerHTML = '<p class="text-slate-500 text-sm">闭眼记忆固化中...</p>';
      countdownNumber.textContent = '3';
      let count = 3;
      const timer = setInterval(() => {
        count--;
        if (count > 0) {
          countdownNumber.textContent = count;
        } else {
          clearInterval(timer);
          playDing();
          blackOverlay.classList.add('opacity-0');
          blackOverlay.classList.remove('opacity-100');
          setTimeout(() => {
            if (currentIndex < vocabularyData.length - 1) {
              currentIndex++;
            } else {
              currentIndex = 0;
            }
            enterPhase0();
          }, 200);
        }
      }, 1000);
    }

    function handleSpaceAction() {
      if (isInPhase4) return;
      switch (currentPhase) {
        case 0: enterPhase1(); break;
        case 1: enterPhase2(); break;
        case 2: enterPhase3(); break;
        case 3: enterPhase4(); break;
      }
    }

    function goToPrevWord() {
      if (isInPhase4) return;
      if (currentIndex > 0) {
        currentIndex--;
        enterPhase0();
      }
    }

    function goToNextWord() {
      if (isInPhase4) return;
      if (currentIndex < vocabularyData.length - 1) {
        currentIndex++;
        enterPhase0();
      }
    }

    spaceBtn.addEventListener('click', handleSpaceAction);
    prevBtn.addEventListener('click', goToPrevWord);
    nextWordBtn.addEventListener('click', goToNextWord);

    document.addEventListener('keydown', (e) => {
      if (isInPhase4) return;
      if (e.key === ' ' || e.code === 'Space') {
        e.preventDefault();
        handleSpaceAction();
      } else if (e.key === 'ArrowRight') {
        e.preventDefault();
        handleSpaceAction();
      } else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        goToPrevWord();
      }
    });

    enterPhase0();
  </script>
</body>
</html>
