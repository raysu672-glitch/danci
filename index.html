<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>视听双轨对齐背单词 - Dual Coding</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes prefix-pulse {
      0%, 100% { text-shadow: 0 0 30px rgba(251, 191, 36, 0.4); }
      50% { text-shadow: 0 0 60px rgba(251, 191, 36, 0.8); }
    }
    .prefix-animate {
      animation: prefix-pulse 1.5s ease-in-out infinite;
    }
    @keyframes root-impact {
      0% { opacity: 0; transform: translateX(80px) scale(1.8); filter: brightness(4) blur(4px); }
      25% { opacity: 1; transform: translateX(-10px) scale(1.05); filter: brightness(2.5) blur(0px); }
      45% { transform: translateX(6px) scale(0.97); filter: brightness(1.2); }
      65% { transform: translateX(-3px) scale(1.01); filter: brightness(1); }
      85% { transform: translateX(1px) scale(0.99); }
      100% { opacity: 1; transform: translateX(0) scale(1); filter: brightness(1); }
    }
    .root-impact {
      animation: root-impact 0.45s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    @keyframes screen-shake {
      0%   { transform: translate(0, 0) rotate(0deg); }
      15%  { transform: translate(-6px, -4px) rotate(-0.5deg); }
      30%  { transform: translate(6px, 3px)  rotate(0.5deg); }
      45%  { transform: translate(-4px, 2px)  rotate(-0.3deg); }
      60%  { transform: translate(4px, -2px)  rotate(0.3deg); }
      75%  { transform: translate(-2px, 1px)  rotate(-0.1deg); }
      100% { transform: translate(0, 0)     rotate(0deg); }
    }
    .shake {
      animation: screen-shake 0.4s ease-out forwards;
    }
  </style>
</head>
<body class="bg-gray-950 text-slate-100 min-h-screen flex flex-col items-center justify-center p-4 select-none">
  <div id="app" class="flex flex-col items-center justify-center">
  <div class="text-center mb-6 px-4">
    <p class="text-slate-400 text-sm leading-relaxed">
      提示：使用键盘 <kbd class="px-2 py-1 bg-slate-700 rounded text-amber-400 font-mono">空格键 Space</kbd> 或 <kbd class="px-2 py-1 bg-slate-700 rounded text-amber-400 font-mono">→</kbd> 控制记忆阶梯，告别死记硬背。
    </p>
  </div>
  <div id="phaseIndicator" class="flex items-center gap-2 mb-6">
    <span id="phase0Dot" class="w-3 h-3 rounded-full bg-amber-400 transition-all duration-300"></span>
    <span id="phase1Dot" class="w-3 h-3 rounded-full bg-slate-600 transition-all duration-300"></span>
    <span id="phase2Dot" class="w-3 h-3 rounded-full bg-slate-600 transition-all duration-300"></span>
    <span id="phase3Dot" class="w-3 h-3 rounded-full bg-slate-600 transition-all duration-300"></span>
    <span id="phase4Dot" class="w-3 h-3 rounded-full bg-slate-600 transition-all duration-300"></span>
    <span id="phaseLabel" class="text-slate-500 text-xs ml-2">阶段 0：前缀呈现</span>
  </div>
  <div class="w-full max-w-3xl mx-auto flex flex-col items-center">
    <div id="wordZone" class="relative flex items-baseline justify-center mb-10 min-h-[120px]">
      <div id="prefixContainer" class="flex items-baseline gap-0">
        <span id="prefixText" class="text-8xl md:text-9xl font-bold text-amber-400 prefix-animate opacity-0"></span>
        <span id="rootText" class="text-8xl md:text-9xl font-bold text-white root-impact opacity-0"></span>
      </div>
    </div>
    <div id="prefixMeanContainer" class="text-center mb-6 opacity-0">
      <span class="text-amber-400 text-xl md:text-2xl font-medium">「<span id="prefixMeanText"></span>」</span>
    </div>
    <div id="logicContainer" class="text-center mb-4 opacity-0 transition-opacity duration-400">
      <div class="inline-flex items-center gap-3 bg-slate-800/50 px-5 py-2.5 rounded-xl border border-slate-700">
        <span class="text-slate-400 text-base">词源逻辑</span>
        <span class="text-xl text-amber-300 font-semibold">→</span>
        <span id="logicText" class="text-xl md:text-2xl text-slate-100"></span>
      </div>
    </div>
    <div id="chineseContainer" class="text-center opacity-0 transition-opacity duration-400">
      <div class="bg-emerald-900/30 px-8 py-4 rounded-2xl border border-emerald-700/50">
        <span id="chineseText" class="text-4xl md:text-5xl font-bold text-emerald-400"></span>
      </div>
    </div>
  </div>
  <div class="mt-10 mb-4">
    <span id="progressText" class="text-slate-600 text-sm font-mono">1 / 6</span>
  </div>
  <div id="actionHint" class="text-center mb-4">
    <p class="text-slate-500 text-sm">按 <kbd class="px-2 py-1 bg-slate-700 rounded text-amber-400 font-mono">空格</kbd> 进入下一阶段</p>
  </div>
  <button id="spaceBtn" class="w-full max-w-xs px-8 py-4 bg-amber-600 hover:bg-amber-500 active:bg-amber-400 text-white rounded-xl font-semibold transition-all duration-200 text-lg shadow-lg shadow-amber-600/30">▶ 下一步 (空格)</button>
  <div class="flex items-center gap-3 mt-4">
    <button id="prevBtn" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg transition-all duration-200 text-sm disabled:opacity-30 disabled:cursor-not-allowed">← 上一个词</button>
    <button id="nextWordBtn" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg transition-all duration-200 text-sm disabled:opacity-30 disabled:cursor-not-allowed">下一个词 →</button>
  </div>
  <div id="blackOverlay" class="fixed inset-0 bg-black z-50 flex flex-col items-center justify-center transition-opacity duration-300 pointer-events-none opacity-0">
    <div id="overlayContent" class="text-center">
      <p id="overlayHint" class="text-slate-500 text-lg md:text-2xl mb-8 tracking-wide">请闭眼，在脑海中回放音形意...</p>
      <div id="countdownNumber" class="text-7xl md:text-9xl font-bold text-slate-300 opacity-60">3</div>
    </div>
  </div>
  <script>
    const vocabularyData = [
      { word: "extract",  prefix: "ex-",   prefixMean: "往外",   root: "tract", rootMean: "拉", logic: "往外拉",                    chinese: "提取，拔出" },
      { word: "attract",  prefix: "at-",   prefixMean: "向/去",  root: "tract", rootMean: "拉", logic: "拉过来",                    chinese: "吸引，引诱" },
      { word: "distract", prefix: "dis-",  prefixMean: "分开/散开", root: "tract", rootMean: "拉", logic: "心思被拉散",              chinese: "使分心，分散注意力" },
      { word: "contract", prefix: "con-",  prefixMean: "共同/一起", root: "tract", rootMean: "拉", logic: "拉到一起",                  chinese: "收缩，合同" },
      { word: "abstract", prefix: "abs-",  prefixMean: "离开/分离", root: "tract", rootMean: "拉", logic: "把核心拉出来、与具体分离",  chinese: "抽象的，摘要" },
      { word: "protract", prefix: "pro-",  prefixMean: "向前",    root: "tract", rootMean: "拉", logic: "向前拉长",                    chinese: "延长，拖延" }
    ];
    let currentIndex = 0, currentPhase = 0, isInPhase4 = false;
    const prefixText = document.getElementById('prefixText'), rootText = document.getElementById('rootText'), prefixMeanText = document.getElementById('prefixMeanText'), logicText = document.getElementById('logicText'), chineseText = document.getElementById('chineseText'), prefixMeanContainer = document.getElementById('prefixMeanContainer'), logicContainer = document.getElementById('logicContainer'), chineseContainer = document.getElementById('chineseContainer'), progressText = document.getElementById('progressText'), actionHint = document.getElementById('actionHint'), spaceBtn = document.getElementById('spaceBtn'), prevBtn = document.getElementById('prevBtn'), nextWordBtn = document.getElementById('nextWordBtn'), phase0Dot = document.getElementById('phase0Dot'), phase1Dot = document.getElementById('phase1Dot'), phase2Dot = document.getElementById('phase2Dot'), phase3Dot = document.getElementById('phase3Dot'), phase4Dot = document.getElementById('phase4Dot'), phaseLabel = document.getElementById('phaseLabel'), blackOverlay = document.getElementById('blackOverlay'), countdownNumber = document.getElementById('countdownNumber'), overlayHint = document.getElementById('overlayHint');
    function speak(w) { if (!('speechSynthesis' in window)) return; speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(w); u.lang = 'en-US'; u.rate = 0.85; speechSynthesis.speak(u); }
    function playDing() { try { const c = new (window.AudioContext||window.webkitAudioContext)(); const o = c.createOscillator(), g = c.createGain(); o.type='sine'; o.frequency.value=1200; g.gain.value=0.3; g.gain.exponentialRampToValueAtTime(0.001, c.currentTime+0.4); o.connect(g); g.connect(c.destination); o.start(); o.stop(c.currentTime+0.4); } catch(e){} }
    function playImpactSound() {
      try {
        const c = new (window.AudioContext||window.webkitAudioContext)();
        const now = c.currentTime, dur = 0.5;
        const buf = c.createBuffer(1, c.sampleRate*dur, c.sampleRate);
        const d = buf.getChannelData(0); for (let i=0; i<d.length; i++) d[i]=Math.random()*2-1;
        const ns = c.createBufferSource(); ns.buffer = buf;
        const bp = c.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=400; bp.frequency.exponentialRampToValueAtTime(80, now+0.3); bp.Q.value=1.5;
        const ng = c.createGain(); ng.gain.value=1.2; ng.gain.exponentialRampToValueAtTime(0.001, now+0.4);
        ns.connect(bp); bp.connect(ng); ng.connect(c.destination); ns.start(now); ns.stop(now+dur);
        const boom = c.createOscillator(), bg = c.createGain(); boom.type='sine'; boom.frequency.value=150; boom.frequency.exponentialRampToValueAtTime(25, now+0.35); bg.gain.value=1.0; bg.gain.exponentialRampToValueAtTime(0.001, now+0.45); boom.connect(bg); bg.connect(c.destination); boom.start(now); boom.stop(now+0.45);
        const cr = c.createOscillator(), cg = c.createGain(); cr.type='sawtooth'; cr.frequency.value=1800; cr.frequency.exponentialRampToValueAtTime(200, now+0.04); cg.gain.value=0.6; cg.gain.exponentialRampToValueAtTime(0.001, now+0.05); cr.connect(cg); cg.connect(c.destination); cr.start(now); cr.stop(now+0.05);
      } catch(e){}
    }
    function updatePhaseIndicator(p) { const dots=[phase0Dot,phase1Dot,phase2Dot,phase3Dot,phase4Dot]; const labels=['阶段 0：前缀呈现','阶段 1：音形缝合（跟读）','阶段 2：逻辑唤醒（盲猜中文）','阶段 3：中文揭晓（验证）','阶段 4：闭眼回放（记忆固化）']; dots.forEach((d,i)=>{d.classList.remove('bg-slate-600','bg-amber-400','bg-emerald-400'); if(i<p)d.classList.add('bg-emerald-400'); else if(i===p)d.classList.add('bg-amber-400'); else d.classList.add('bg-slate-600');}); phaseLabel.textContent=labels[p]||''; }
    function enterPhase0() { currentPhase=0; isInPhase4=false; const d=vocabularyData[currentIndex]; progressText.textContent=`${currentIndex+1} / ${vocabularyData.length}`; prevBtn.disabled=currentIndex===0; nextWordBtn.disabled=currentIndex===vocabularyData.length-1; prefixText.textContent=d.prefix; rootText.textContent=d.root; prefixMeanText.textContent=d.prefixMean; logicText.textContent=d.logic; chineseText.textContent=d.chinese; rootText.classList.remove('root-impact','opacity-100'); rootText.classList.add('opacity-0'); logicContainer.classList.add('opacity-0'); logicContainer.classList.remove('opacity-100'); chineseContainer.classList.add('opacity-0'); chineseContainer.classList.remove('opacity-100'); requestAnimationFrame(()=>{prefixText.classList.remove('opacity-0');prefixText.classList.add('opacity-100');prefixMeanContainer.style.transition='none';prefixMeanContainer.classList.remove('opacity-0');prefixMeanContainer.classList.add('opacity-100');setTimeout(()=>{prefixMeanContainer.style.transition=''},10);}); updatePhaseIndicator(0); actionHint.innerHTML='<p class="text-slate-500 text-sm">按 <kbd class="px-2 py-1 bg-slate-700 rounded text-amber-400 font-mono">空格</kbd> 播放发音并拼合单词</p>'; spaceBtn.textContent='▶ 发音拼合'; spaceBtn.disabled=false; spaceBtn.classList.remove('opacity-50','cursor-not-allowed'); }
    function enterPhase1() { currentPhase=1; const d=vocabularyData[currentIndex]; speak(d.word); playImpactSound(); const app=document.getElementById('app'); app.classList.remove('shake'); void app.offsetWidth; app.classList.add('shake'); rootText.classList.remove('root-impact'); void rootText.offsetWidth; rootText.classList.add('root-impact'); logicContainer.classList.add('opacity-0'); logicContainer.classList.remove('opacity-100'); chineseContainer.classList.add('opacity-0'); chineseContainer.classList.remove('opacity-100'); updatePhaseIndicator(1); actionHint.innerHTML='<p class="text-slate-500 text-sm">大声跟读！按 <kbd class="px-2 py-1 bg-slate-700 rounded text-amber-400 font-mono">空格</kbd> 显示词源逻辑</p>'; spaceBtn.textContent='▶ 显示逻辑'; }
    function enterPhase2() { currentPhase=2; logicContainer.classList.remove('opacity-0'); logicContainer.classList.add('opacity-100'); chineseContainer.classList.add('opacity-0'); chineseContainer.classList.remove('opacity-100'); updatePhaseIndicator(2); actionHint.innerHTML='<p class="text-slate-500 text-sm">盲猜中文！按 <kbd class="px-2 py-1 bg-slate-700 rounded text-amber-400 font-mono">空格</kbd> 揭晓答案</p>'; spaceBtn.textContent='▶ 揭晓中文'; }
    function enterPhase3() { currentPhase=3; chineseContainer.classList.remove('opacity-0'); chineseContainer.classList.add('opacity-100'); updatePhaseIndicator(3); actionHint.innerHTML='<p class="text-slate-500 text-sm">看清中文！按 <kbd class="px-2 py-1 bg-slate-700 rounded text-amber-400 font-mono">空格</kbd> 进入闭眼回放</p>'; spaceBtn.textContent='▶ 闭眼回放'; }
    function enterPhase4() { currentPhase=4; isInPhase4=true; updatePhaseIndicator(4); blackOverlay.classList.remove('opacity-0'); blackOverlay.classList.add('opacity-100'); spaceBtn.disabled=true; spaceBtn.classList.add('opacity-50','cursor-not-allowed'); actionHint.innerHTML='<p class="text-slate-500 text-sm">闭眼记忆固化中...</p>'; countdownNumber.textContent='3'; let count=3; const timer=setInterval(()=>{count--;if(count>0)countdownNumber.textContent=count;else{clearInterval(timer);playDing();blackOverlay.classList.add('opacity-0');blackOverlay.classList.remove('opacity-100');setTimeout(()=>{currentIndex=currentIndex<vocabularyData.length-1?currentIndex+1:0;enterPhase0();},200);}},1000);}
    function handleSpaceAction() { if(isInPhase4)return; switch(currentPhase){case 0:enterPhase1();break;case 1:enterPhase2();break;case 2:enterPhase3();break;case 3:enterPhase4();break;} }
    function goToPrevWord() { if(isInPhase4)return; if(currentIndex>0){currentIndex--;enterPhase0();} }
    function goToNextWord() { if(isInPhase4)return; if(currentIndex<vocabularyData.length-1){currentIndex++;enterPhase0();} }
    spaceBtn.addEventListener('click', handleSpaceAction); prevBtn.addEventListener('click', goToPrevWord); nextWordBtn.addEventListener('click', goToNextWord);
    document.addEventListener('keydown', e=>{if(isInPhase4)return;if(e.key===' '||e.code==='Space'){e.preventDefault();handleSpaceAction();}else if(e.key==='ArrowRight'){e.preventDefault();handleSpaceAction();}else if(e.key==='ArrowLeft'){e.preventDefault();goToPrevWord();}});
    enterPhase0();
  </script>
  </div>
</body>
</html>
